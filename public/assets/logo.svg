<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 470 150" role="img" aria-label="ZOOM Government Services">
  <title>ZOOM Government Services</title>
  <defs>
    <clipPath id="globeClip"><circle cx="277" cy="73" r="42"/></clipPath>
    <linearGradient id="globeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f86f5"/>
      <stop offset="1" stop-color="#1763d6"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#27d977"/>
      <stop offset="1" stop-color="#11b35c"/>
    </linearGradient>
  </defs>

  <!-- Z -->
  <path d="M18,28 H96 V50 L44,96 H96 V118 H18 V96 L70,50 H18 Z" fill="#0e1726"/>

  <!-- O #1 — magnifying glass -->
  <line x1="192" y1="98" x2="218" y2="124" stroke="#0e1726" stroke-width="16" stroke-linecap="round"/>
  <circle cx="167" cy="73" r="36" fill="#ffffff"/>
  <circle cx="167" cy="73" r="36" fill="none" stroke="url(#ringGrad)" stroke-width="14"/>
  <!-- lens glare -->
  <path d="M150,60 a22,22 0 0 1 17,-9" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.85"/>

  <!-- O #2 — globe -->
  <g>
    <circle cx="277" cy="73" r="42" fill="url(#globeGrad)"/>
    <g clip-path="url(#globeClip)" stroke="#ffffff" fill="none" opacity="0.55" stroke-width="2.2">
      <line x1="235" y1="73" x2="319" y2="73"/>
      <ellipse cx="277" cy="73" rx="42" ry="15"/>
      <ellipse cx="277" cy="73" rx="42" ry="30"/>
      <ellipse cx="277" cy="73" rx="14" ry="42"/>
      <ellipse cx="277" cy="73" rx="29" ry="42"/>
    </g>
    <!-- simplified white landmasses -->
    <g clip-path="url(#globeClip)" fill="#ffffff" opacity="0.95">
      <path d="M250,55 q10,-6 18,-1 q6,4 2,10 q-7,7 -16,4 q-9,-3 -4,-13 Z"/>
      <path d="M288,80 q12,-3 16,5 q3,8 -6,12 q-11,4 -15,-5 q-3,-9 5,-12 Z"/>
      <path d="M258,92 q7,-2 9,3 q1,5 -5,6 q-7,1 -8,-4 q0,-4 4,-5 Z"/>
    </g>
    <circle cx="277" cy="73" r="42" fill="none" stroke="#0e1726" stroke-width="2" opacity="0.12"/>
  </g>

  <!-- airplane trail (dashed arc from globe toward the M) -->
  <path d="M300,42 Q330,2 360,30" fill="none" stroke="#0e1726" stroke-width="3.4"
        stroke-linecap="round" stroke-dasharray="1 9" opacity="0.85"/>

  <!-- airplane (top view, nose up-right) -->
  <g transform="translate(351,15) rotate(-20)" fill="#0e1726">
    <path d="M6,0 Q6,-3.4 14,-3.4 L34,-2 Q40,-1 40,0 Q40,1 34,2 L14,3.4 Q6,3.4 6,0 Z"/>
    <path d="M18,-2.4 L3,-15 Q1,-15 1.6,-12 L15,-1 Z"/>
    <path d="M18,2.4 L3,15 Q1,15 1.6,12 L15,1 Z"/>
    <path d="M9,-1.8 L3,-8 Q2,-8 2.6,-6 L11,-1 Z"/>
    <path d="M9,1.8 L3,8 Q2,8 2.6,6 L11,1 Z"/>
  </g>

  <!-- M -->
  <path d="M352,118 V28 H374 L404,84 L434,28 H456 V118 H434 V68 L412,108 H396 L374,68 V118 Z" fill="#0e1726"/>
</svg>
